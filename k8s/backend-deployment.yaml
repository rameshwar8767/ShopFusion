apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: shopfusion
  labels:
    app: backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend
        image: rameshwarrm/shopfusion-backend:latest

        ports:
          - containerPort: 5000

        envFrom:
          - configMapRef:
              name: backend-config

          - secretRef:
              name: backend-secret